<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f1f3d"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Chart fill area -->
  <path d="M8 48 L18 36 L26 40 L36 24 L46 28 L56 14 L56 52 L8 52 Z" fill="url(#fill)"/>

  <!-- Chart line -->
  <polyline points="8,48 18,36 26,40 36,24 46,28 56,14"
    fill="none" stroke="url(#line)" stroke-width="3.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dot at peak -->
  <circle cx="56" cy="14" r="3.5" fill="#22d3ee"/>

  <!-- AI spark -->
  <circle cx="50" cy="10" r="1.5" fill="#a78bfa" opacity="0.9"/>
  <circle cx="58" cy="20" r="1" fill="#a78bfa" opacity="0.7"/>
</svg>
